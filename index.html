<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Validador de Contraseñas</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="container">
    <h2>Validador de Contraseñas</h2>

    <input type="password" id="password" placeholder="Ingresa tu contraseña">
    <input type="password" id="confirmPassword" placeholder="Confirma tu contraseña">

    <button onclick="validar()">Validar</button>

    <!-- Barra -->
    <div class="barra">
        <div id="progreso"></div>
    </div>

    <p id="nivel"></p>

    <!-- Reglas -->
    <div class="reglas">
        <p id="r1">❌ 8 caracteres</p>
        <p id="r2">❌ Mayúscula</p>
        <p id="r3">❌ Número</p>
        <p id="r4">❌ Carácter especial</p>
        <p id="r5">❌ Sin espacios</p>
        <p id="r6">❌ Coinciden</p>
    </div>

    <div id="resultado"></div>
</div>

<script src="js/validator.js"></script>
</body>
</html>
