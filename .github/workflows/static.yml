
name: Desplegar sitio en GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# Permisos requeridos por Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Solo una implementación activa a la vez
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Empaquetar el contenido del sitio como artifact para Pages
      - name: Subir artifact de Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: "." 

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Desplegar a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
